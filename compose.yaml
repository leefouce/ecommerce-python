services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_TOKEN_SECRET=${APP_TOKEN_SECRET:-development-secret-change-me}
      - APP_ACCESS_TOKEN_EXPIRE_MINUTES=${APP_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - APP_DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-ecommerce}:${POSTGRES_PASSWORD:-ecommerce}@db:5432/${POSTGRES_DB:-ecommerce}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-ecommerce}
      - POSTGRES_USER=${POSTGRES_USER:-ecommerce}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ecommerce}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecommerce} -d ${POSTGRES_DB:-ecommerce}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
